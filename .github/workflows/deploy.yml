name: Build and Push Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t akkc01/akkc:${{ github.sha }} .

      - name: Push Image
        run: |
          docker push akkc01/akkc:${{ github.sha }}


      - name: Update Manifest Repo
        run: |
          git clone https://github.com/akkc01/GitOps-Argocd-manifest-portfolio.git
          cd GitOps-Argocd-manifest-portfolio/manifest-files
          
          sed -i "s|image: .*|image: akkc01/akkc:${{ github.sha }}|" deployment.yaml
          
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "Update image tag"
          git push
